<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥠 媽媽的專屬好運籤</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #fff4e6; /* 溫暖的奶油橘色 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .title { color: #d97757; font-size: 22px; margin-bottom: 30px; font-weight: bold; }
        #cookie {
            font-size: 100px;
            cursor: pointer;
            transition: 0.1s;
            user-select: none;
        }
        #cookie:active { transform: scale(0.9) rotate(10deg); }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-10deg); }
            75% { transform: translateX(10px) rotate(10deg); }
        }
        #fortune-slip {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(217, 119, 87, 0.15);
            width: 80%;
            max-width: 300px;
            color: #5c4a43;
            font-size: 16px;
            line-height: 1.5;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
            border-left: 5px solid #d97757;
        }
        .show-slip { opacity: 1 !important; transform: translateY(0) !important; }
        .hint { margin-top: 15px; color: #b89286; font-size: 14px; }
    </style>
</head>
<body>

    <div class="title">母親節限定 幸運餅乾 🥠</div>
    <div id="cookie">🥠</div>
    <div class="hint">點擊餅乾抽出今日好運</div>

    <div id="fortune-slip"></div>

    <script>
        const cookie = document.getElementById('cookie');
        const slip = document.getElementById('fortune-slip');
        
        const fortunes = [
            "【大吉】今日宜：放下家事，躺平休息！<br><br>幸運物：寶貝打來的一通電話 📞",
            "【特大吉】獲得「煩惱全消」魔法！<br><br>請放心，今年小孩絕對會把自己照顧得好好的 💪",
            "【超級吉】今日宜：當個女王 👑<br><br>想吃什麼、想買什麼通通去，帳單...等我以後賺錢幫妳付！",
            "【無敵大吉】刮中隱藏大獎！<br><br>獲得「無限期愛妳」憑證一張，母親節快樂 ❤️"
        ];

        cookie.addEventListener('click', () => {
            // 餅乾震動動畫
            cookie.classList.remove('shake');
            void cookie.offsetWidth;
            cookie.classList.add('shake');

            // 隱藏舊的籤詩，稍微延遲後顯示新的籤詩
            slip.classList.remove('show-slip');
            
            setTimeout(() => {
                const randomFortune = fortunes[Math.floor(Math.random() * fortunes.length)];
                slip.innerHTML = randomFortune;
                slip.classList.add('show-slip');
            }, 300); // 配合震動時間的延遲
        });
    </script>
</body>
</html>
