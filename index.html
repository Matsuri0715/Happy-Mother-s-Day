<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏮 專屬天燈</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; height: 100vh; overflow: hidden; font-family: 'Noto Serif TC', serif;
            background: linear-gradient(to bottom, #0f172a, #1e293b); /* 星空背景 */
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        .lantern {
            font-size: 120px; transition: all 5s ease-in; cursor: pointer; filter: drop-shadow(0 0 20px rgba(255,165,0,0.8));
        }
        .fly {
            transform: translateY(-80vh) scale(0.2); opacity: 0;
        }
        .btn {
            margin-top: 40px; padding: 12px 30px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.5);
            color: white; border-radius: 30px; font-size: 16px; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.3); }
        .message {
            position: absolute; text-align: center; font-size: 20px; line-height: 2; letter-spacing: 2px;
            opacity: 0; transition: opacity 3s ease 2s; /* 延遲出現 */
        }
        .show-message { opacity: 1; }
    </style>
</head>
<body>

    <div class="lantern" id="lantern">🏮</div>
    <button class="btn" id="fly-btn">✨ 點火升空</button>

    <div class="message" id="message">
        願媽媽天天開心、身體健康。<br>
        把最大的願望交給天空，<br>
        把最真實的愛留給妳 ❤️<br>
        母親節快樂！
    </div>

    <script>
        const lantern = document.getElementById('lantern');
        const btn = document.getElementById('fly-btn');
        const message = document.getElementById('message');

        btn.addEventListener('click', () => {
            lantern.classList.add('fly');
            btn.style.opacity = '0';
            message.classList.add('show-message');
        });
    </script>
</body>
</html>
