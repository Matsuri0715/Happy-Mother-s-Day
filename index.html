<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍵 喝杯熱茶吧</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif TC', serif; /* 使用溫雅的明體 */
            background-color: #f7f4ef; /* 溫暖的米灰色 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #5c4a43;
            text-align: center;
        }
        .cup-container {
            position: relative;
            margin-bottom: 40px;
        }
        .cup {
            font-size: 80px;
            position: relative;
            z-index: 2;
        }
        /* 製作熱氣裊裊上升的動畫 */
        .steam {
            position: absolute;
            top: -30px;
            font-size: 30px;
            color: #dcd0c5;
            opacity: 0;
            z-index: 1;
        }
        .steam-1 { left: 15px; animation: rise 3s infinite ease-in; }
        .steam-2 { left: 45px; animation: rise 3s infinite 1s ease-in; }
        
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.7; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }

        .text-container {
            font-size: 18px;
            line-height: 2;
            letter-spacing: 1px;
            opacity: 0;
            animation: fadeIn 2s forwards 1.5s; /* 延遲 1.5 秒後淡入 */
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="cup-container">
        <!-- 裊裊熱氣 -->
        <div class="steam steam-1">〰</div>
        <div class="steam steam-2">〰</div>
        <!-- 茶杯本體 -->
        <div class="cup">🍵</div>
    </div>

    <div class="text-container">
        媽，平常辛苦了。<br>
        今天什麼都別操心，<br>
        先坐下來好好休息，喝杯茶吧！<br><br>
        母親節快樂 🌸
    </div>

</body>
</html>
