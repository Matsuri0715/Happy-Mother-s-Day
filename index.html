<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎫 給媽媽的專屬車票</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f4eade; /* 溫暖的奶茶色背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #4a3b32;
        }

        .ticket {
            background-color: #fff;
            width: 320px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
            border-top: 8px solid #d18b70; /* 票根上方的暖橘色點綴 */
        }

        /* 製作車票中間的虛線與打洞效果 */
        .ticket::before, .ticket::after {
            content: '';
            position: absolute;
            top: 55%;
            width: 30px;
            height: 30px;
            background-color: #f4eade;
            border-radius: 50%;
        }

        .ticket::before { left: -15px; }
        .ticket::after { right: -15px; }

        .divider {
            border-bottom: 2px dashed #e0d5c1;
            margin: 0 20px;
            position: absolute;
            top: 55%;
            left: 10px;
            right: 10px;
        }

        .top-half {
            padding: 30px 25px;
            text-align: center;
        }

        .bottom-half {
            padding: 30px 25px;
            background-color: #faf7f2;
            text-align: center;
        }

        .stations {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .station {
            font-size: 24px;
            font-weight: bold;
            color: #d18b70;
        }

        .arrow {
            font-size: 20px;
            color: #bfa396;
        }

        .ticket-info {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 14px;
            color: #7a6b63;
            text-align: left;
        }

        .info-block span {
            display: block;
            font-size: 12px;
            color: #bfa396;
            margin-bottom: 3px;
        }

        .info-block strong {
            font-size: 16px;
            color: #4a3b32;
        }

        .message {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 0;
            font-weight: 500;
        }

        .stamp {
            margin-top: 15px;
            font-size: 12px;
            color: #d18b70;
            border: 1px solid #d18b70;
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            transform: rotate(-5deg);
        }
    </style>
</head>
<body>

    <div class="ticket">
        <div class="top-half">
            <div class="stations">
                <div class="station">台南</div>
                <div class="arrow">➔</div>
                <div class="station">溫暖的家</div>
            </div>
            
            <div class="ticket-info">
                <div class="info-block">
                    <span>搭乘時間</span>
                    <strong>下一次放假</strong>
                </div>
                <div class="info-block">
                    <span>票價</span>
                    <strong>無價的愛</strong>
                </div>
                <div class="info-block">
                    <span>座位</span>
                    <strong>心裡第一排</strong>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="bottom-half">
            <p class="message">
                親愛的媽媽，母親節快樂！<br>
                雖然今天沒辦法陪在妳身邊，<br>
                但等我忙完一定馬上回家。<br>
                憑此票券可兌換無限次擁抱！
            </p>
            <div class="stamp">✅ 已確認想妳</div>
        </div>
    </div>

</body>
</html>
