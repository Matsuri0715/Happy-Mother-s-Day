<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💌 給媽媽的一封信</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfbf7; /* 溫暖的奶油米白色 */
            --text-color: #5c4a43; /* 柔和的深棕色 */
            --highlight: #e29587; /* 溫柔的灰粉色 */
        }

        body {
            font-family: 'Noto Serif TC', serif; /* 使用優雅的明體 */
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 85%;
            max-width: 400px;
            padding: 30px;
            text-align: left;
            position: relative;
        }

        /* 初始的信封按鈕 */
        #start-btn {
            background: none;
            border: 2px solid var(--highlight);
            color: var(--highlight);
            font-size: 18px;
            padding: 15px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Noto Serif TC', serif;
            display: block;
            margin: 0 auto;
            transition: all 0.3s;
            animation: float 2s ease-in-out infinite;
        }

        #start-btn:hover {
            background: var(--highlight);
            color: white;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* 打字機文字區塊 */
        #typewriter-text {
            font-size: 18px;
            line-height: 2;
            letter-spacing: 2px;
            min-height: 250px;
        }

        /* 游標閃爍效果 */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 18px;
            background-color: var(--highlight);
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 結尾隱藏的花朵圖案 */
        #ending-flower {
            text-align: center;
            margin-top: 30px;
            font-size: 40px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 1s ease;
        }

        .show-flower {
            opacity: 1 !important;
            transform: scale(1) !important;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 點擊開始的按鈕 -->
        <button id="start-btn">💌 點擊開啟信件</button>
        
        <!-- 文字顯示區 -->
        <div id="text-container" class="hidden">
            <span id="typewriter-text"></span><span class="cursor" id="cursor"></span>
        </div>

        <!-- 結尾的插圖/符號 -->
        <div id="ending-flower">🌷 母親節快樂 🌷</div>
    </div>

    <script>
        // 你想對媽媽說的話，換行請用 \n
        const letterContent = "親愛的媽媽：\n\n母親節快樂！\n\n雖然這陣子不在家，\n沒辦法陪在妳身邊過節，\n但還是想跟妳說聲謝謝。\n\n謝謝妳一直以來的照顧與包容，\n妳的健康快樂就是我最大的安心。\n\n等我這陣子忙完，就回家陪妳吃飯！\n\n永遠愛妳喔 ❤️";
        
        const startBtn = document.getElementById('start-btn');
        const textContainer = document.getElementById('text-container');
        const typewriterText = document.getElementById('typewriter-text');
        const cursor = document.getElementById('cursor');
        const endingFlower = document.getElementById('ending-flower');

        let index = 0;
        const typingSpeed = 150; // 打字速度，數字越大越慢

        // 打字機特效函數
        function typeWriter() {
            if (index < letterContent.length) {
                // 處理換行符號
                if (letterContent.charAt(index) === '\n') {
                    typewriterText.innerHTML += '<br>';
                } else {
                    typewriterText.innerHTML += letterContent.charAt(index);
                }
                index++;
                
                // 隨機稍微改變打字速度，模仿真人打字感
                let randomSpeed = typingSpeed + (Math.random() * 50 - 25);
                setTimeout(typeWriter, randomSpeed);
            } else {
                // 打字結束，隱藏游標，顯示結尾圖案
                cursor.style.display = 'none';
                endingFlower.classList.add('show-flower');
            }
        }

        // 點擊按鈕後觸發
        startBtn.addEventListener('click', () => {
            startBtn.classList.add('hidden'); // 隱藏按鈕
            textContainer.classList.remove('hidden'); // 顯示文字區塊
            setTimeout(typeWriter, 500); // 延遲半秒開始打字
        });
    </script>
</body>
</html>
