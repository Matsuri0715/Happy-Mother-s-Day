<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📻 我們的錄音帶</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; height: 100vh; background-color: #e0d5c1; font-family: 'Noto Sans TC', sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: #4a3b32;
        }
        /* 錄音帶本體 */
        .cassette {
            width: 300px; height: 190px; background-color: #333; border-radius: 15px; position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); border: 2px solid #555; display: flex; flex-direction: column; align-items: center;
        }
        /* 錄音帶貼紙 */
        .label {
            width: 260px; height: 110px; background-color: #f4eade; margin-top: 15px; border-radius: 8px;
            display: flex; flex-direction: column; justify-content: space-between; padding: 10px; box-sizing: border-box;
            border-top: 15px solid #d18b70;
        }
        .label-title { text-align: center; font-weight: bold; font-size: 18px; color: #4a3b32; }
        /* 齒輪區塊 */
        .reels { display: flex; justify-content: space-between; padding: 0 20px; }
        .reel { font-size: 40px; line-height: 1; }
        /* 旋轉動畫 */
        .spin { animation: spin 3s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .play-btn {
            margin-top: 30px; padding: 10px 40px; background-color: #d18b70; color: white; border: none;
            border-radius: 25px; font-size: 18px; cursor: pointer; box-shadow: 0 4px 10px rgba(209, 139, 112, 0.4);
        }
        .play-btn:active { transform: scale(0.95); }
        
        /* 歌詞文字區 */
        .lyrics {
            margin-top: 30px; height: 100px; font-size: 16px; line-height: 1.8; text-align: center; padding: 0 20px;
        }
    </style>
</head>
<body>

    <div class="cassette">
        <div class="label">
            <div class="label-title">給媽媽的悄悄話</div>
            <div class="reels">
                <div class="reel" id="reel1">⚙️</div>
                <div class="reel" id="reel2">⚙️</div>
            </div>
        </div>
    </div>

    <button class="play-btn" id="play-btn">▶ 播放</button>
    <div class="lyrics" id="lyrics"></div>

    <!-- 隱藏的 YouTube 播放器 -->
    <!-- 👇👇👇 請把下面的 YOUTUBE_ID 換成你的影片代碼 👇👇👇 -->
    <iframe id="yt-player" width="0" height="0" src="https://www.youtube.com/watch?v=a53LYWWuAWU" frameborder="0" allow="autoplay"></iframe>

    <script>
        const playBtn = document.getElementById('play-btn');
        const reel1 = document.getElementById('reel1');
        const reel2 = document.getElementById('reel2');
        const lyricsDiv = document.getElementById('lyrics');
        
        // 抓取 YouTube 播放器
        const ytPlayer = document.getElementById('yt-player').contentWindow;

        const message = "媽，辛苦了！\n雖然現在沒辦法陪在妳身邊，\n但我一直都很掛念妳喔。\n謝謝妳所有的包容，\n母親節快樂 ❤️";
        let index = 0;
        let isPlaying = false;

        playBtn.addEventListener('click', () => {
            if (isPlaying) return;
            isPlaying = true;
            playBtn.style.opacity = '0.5';
            playBtn.innerText = '播放中...';
            
            // 觸發 YouTube 播放
            ytPlayer.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            
            // 啟動齒輪旋轉
            reel1.classList.add('spin');
            reel2.classList.add('spin');

            // 打字機效果
            function type() {
                if (index < message.length) {
                    if (message.charAt(index) === '\n') {
                        lyricsDiv.innerHTML += '<br>';
                    } else {
                        lyricsDiv.innerHTML += message.charAt(index);
                    }
                    index++;
                    setTimeout(type, 150); // 調整這裡的數字可以改變打字速度
                } else {
                    // 打字結束 (影片繼續播)
                    reel1.classList.remove('spin');
                    reel2.classList.remove('spin');
                    playBtn.innerText = '播放完畢';
                }
            }
            type();
        });
    </script>
</body>
</html>
