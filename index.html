<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌱 為妳種一朵花</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f7f4; /* 清新的淡綠色背景 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #5c6b65;
            text-align: center;
        }
        #plant-container {
            font-size: 100px;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }
        .bounce { animation: bounceUp 0.5s; }
        @keyframes bounceUp {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px) scale(1.1); }
        }
        #water-btn {
            background-color: #88b7b5;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(136, 183, 181, 0.3);
            transition: 0.2s;
        }
        #water-btn:active { transform: scale(0.95); }
        #message {
            margin-top: 30px;
            font-size: 18px;
            line-height: 1.6;
            opacity: 0;
            transition: opacity 1.5s ease;
            padding: 0 20px;
        }
        .show { opacity: 1 !important; }
    </style>
</head>
<body>

    <div id="plant-container">🌱</div>
    <button id="water-btn">💧 點擊澆水</button>
    
    <div id="message">
        養大一朵花需要很多耐心，<br>
        就像妳花了很多心力把我養大。<br>
        媽，謝謝妳，母親節快樂！❤️
    </div>

    <script>
        const plant = document.getElementById('plant-container');
        const btn = document.getElementById('water-btn');
        const msg = document.getElementById('message');
        
        let growthStage = 0;
        const stages = ['🌱', '🌿', '🌷']; // 種子 -> 葉子 -> 花

        btn.addEventListener('click', () => {
            if (growthStage < 2) {
                growthStage++;
                // 替換植物圖案並加入跳動特效
                plant.textContent = stages[growthStage];
                plant.classList.remove('bounce');
                void plant.offsetWidth; // 觸發重繪
                plant.classList.add('bounce');

                // 如果開花了，隱藏按鈕並顯示文字
                if (growthStage === 2) {
                    btn.style.display = 'none';
                    msg.classList.add('show');
                }
            }
        });
    </script>
</body>
</html>
